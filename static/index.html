<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NanoLM v0.1.1 - AI 聊天</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' style='stop-color:%236360f1'/%3E%3Cstop offset='100%25' style='stop-color:%239338ea'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='16' cy='16' r='16' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Inter,sans-serif' font-size='14' font-weight='700' fill='white'%3ENL%3C/text%3E%3C/svg%3E">

    <link rel="stylesheet" href="/static/style.css">

    <link rel="preconnect" href="https://fonts.googlefonts.cn">
    <link href="https://fonts.googlefonts.cn/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.staticfile.org/KaTeX/0.16.9/katex.min.css">
    <link rel="stylesheet" href="https://cdn.staticfile.org/highlight.js/11.9.0/styles/github.min.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.staticfile.org/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdn.staticfile.org/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <script src="https://cdn.staticfile.org/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdn.staticfile.org/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen w-full">
        <main class="flex flex-col flex-1 h-screen">
            <!-- 顶部标题栏 -->
            <header class="bg-white border-b border-gray-200 p-4 md:px-6 md:py-4 shadow-sm">
                <div class="max-w-4xl mx-auto flex justify-between items-center">
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">NanoLM <span class="text-sm font-normal text-gray-400">v0.1.1</span></h1>
                        <p class="text-xs text-gray-400 mt-1">GV: {{__GENERATE_COUNT__}} / 访客: {{__VISITOR_COUNT__}}</p>
                    </div>
                    <a href="https://github.com/jeurtr/nanolm" target="_blank" rel="noopener noreferrer" class="text-gray-400 hover:text-gray-600 transition-colors duration-200" title="View on GitHub">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                    </a>
                </div>
            </header>

            <!-- 聊天记录区域 -->
            <div id="chat-container" class="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar">
                <div class="max-w-4xl mx-auto w-full">
                    <!-- 欢迎消息 -->
                    <div class="flex items-start gap-4 my-8" data-role="assistant">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center text-white flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
                        </div>
                        <div data-content="你好！我是AI助手。你今天想聊些什么？" class="bg-white border border-gray-100 p-4 rounded-xl rounded-tl-none prose max-w-none">
                            <p>你好！我是AI助手。你今天想聊些什么？</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area p-4 md:p-6 bg-gray-50 border-t border-gray-200">
                <div class="max-w-4xl mx-auto relative">
                    <!-- 参数设置面板 -->
                    <div id="settings-panel" class="hidden absolute bottom-full left-0 mb-3 bg-white border border-gray-200 rounded-lg p-4 shadow-lg w-full max-w-sm">
                        <div class="flex flex-col">
                            <div class="space-y-2">
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-1.5">
                                        <label for="temperature-slider" class="text-sm font-medium text-gray-700">Temperature</label>
                                        <div class="group relative flex items-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 cursor-help"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 rounded-lg bg-white border border-gray-200 p-3 text-xs text-gray-600 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10 shadow-lg">
                                                <p class="font-bold mb-1">温度</p>
                                                较高的值会使输出更随机、更有创意，较低的值会使其更具确定性和专注性。
                                            </div>
                                        </div>
                                    </div>
                                    <input type="number" id="temperature-input" min="0" max="2" step="0.05" class="w-20 text-center text-sm font-mono bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 p-1">
                                </div>
                                <input id="temperature-slider" type="range" min="0" max="2" value="1.0" step="0.05" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                            <div class="space-y-2 pt-4 mt-4 border-t border-gray-100">
                                <div class="flex justify-between items-center">
                                    <div class="flex items-center gap-1.5">
                                        <label for="top-p-slider" class="text-sm font-medium text-gray-700">Top P</label>
                                        <div class="group relative flex items-center">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-gray-400 cursor-help"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
                                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-64 rounded-lg bg-white border border-gray-200 p-3 text-xs text-gray-600 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-10 shadow-lg">
                                                <p class="font-bold mb-1">核采样</p>
                                                较高的值会考虑更多词汇选择，较低的值会使输出更保守、更可预测。
                                            </div>
                                        </div>
                                    </div>
                                    <input type="number" id="top-p-input" min="0" max="1" step="0.05" class="w-20 text-center text-sm font-mono bg-gray-50 border border-gray-300 rounded-md focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 p-1">
                                </div>
                                <input id="top-p-slider" type="range" min="0" max="1" value="0.95" step="0.05" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                            </div>
                        </div>
                    </div>

                    <form id="chat-form" class="relative">
                        <div class="bg-white rounded-2xl border border-gray-300 focus-within:border-blue-500 focus-within:shadow-sm transition-all duration-200 flex flex-col">
                            <div class="flex items-end p-2 pb-1">
                                <textarea id="message-input" class="autoresize-textarea flex-1 bg-transparent text-gray-900 placeholder-gray-400 focus:outline-none px-1" placeholder="在这里输入消息..." rows="1"></textarea>
                            </div>
                            <div class="flex items-center justify-between pt-2 pb-1 px-3 border-t border-gray-100">
                                <button type="button" id="settings-btn" title="参数设置" class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors duration-200">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="21" x2="14" y1="4" y2="4"/><line x1="10" x2="3" y1="4" y2="4"/><line x1="21" x2="12" y1="12" y2="12"/><line x1="8" x2="3" y1="12" y2="12"/><line x1="21" x2="16" y1="20" y2="20"/><line x1="12" x2="3" y1="20" y2="20"/><line x1="14" x2="14" y1="2" y2="6"/><line x1="8" x2="8" y1="10" y2="14"/><line x1="16" x2="16" y1="18" y2="22"/></svg>
                                    <span class="text-xs">参数</span>
                                </button>
                                <button id="send-btn" type="submit" class="p-2 rounded-full bg-blue-600 hover:bg-blue-700 transition-colors duration-200 disabled:bg-gray-300 disabled:cursor-not-allowed flex-shrink-0" disabled>
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="m22 2-7 20-4-9-9-4Z"></path><path d="M22 2 11 13"></path></svg>
                                </button>
                            </div>
                        </div>
                    </form>
                    <p class="text-xs text-gray-400 text-center mt-3 px-4">AI 可能会犯错。请核查重要信息。</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
