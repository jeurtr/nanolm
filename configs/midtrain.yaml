# Midtrain 长文适应阶段配置
extends: default

stage: midtrain
n_epochs: 1
batch_size: 18
gradient_accumulation_steps: 3
eval_batch_interval: 100

model:
  max_position_embeddings: 2048
  original_max_position_embeddings: 512
  rope:
    rope_type: yarn

lr:
  max: 8.0e-5
  initial: 1.0e-7
  scheduler: true

data_size: 1147000
