# SFT 指令微调阶段配置
extends: default

stage: sft
n_epochs: 1
batch_size: 15
gradient_accumulation_steps: 3
eval_batch_interval: 100

model:
  max_position_embeddings: 2048
  original_max_position_embeddings: 512
  rope:
    rope_type: yarn

lr:
  max: 2.0e-5
  initial: 1.0e-7
  scheduler: true

sft:
  mask_prompt: true

data_size: 2430000
