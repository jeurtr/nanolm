name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: "check ."

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install mypy>=1.8.0
      - run: mypy nanolm/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install torch>=2.1.0 --index-url https://download.pytorch.org/whl/cpu
      - run: pip install transformers>=4.36.0 sentencepiece>=0.1.99 protobuf>=4.25.0 pyyaml>=6.0 numpy>=1.24.0 orjson>=3.9.0
      - run: pip install pyarrow>=14.0.0 pandas>=2.0.0 scikit-learn>=1.3.0 modelscope>=1.10.0
      - run: pip install pytest>=7.0
      - run: pip install -e .
      - run: python -c "import nanolm; print(f'NanoLM v{nanolm.__version__}')"
      - run: pytest tests/ -v

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install bandit>=1.7.0 pip-audit
      - run: bandit -r nanolm/ model/ train/ toolkit/ eval/ --skip B101,B311
      - run: pip-audit
